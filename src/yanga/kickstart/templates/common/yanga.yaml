pipeline:
  install:
    - step: CreateVEnv
      module: pypeline.steps.create_venv
      config:
        python_version: 3.11
        bootstrap_script: .bootstrap/bootstrap.py
    - step: ScoopInstall
      module: yanga_core.steps.scoop_install
      description: Install scoop dependencies
    - step: WestInstall
      module: yanga_core.steps.west_install
      description: Install west dependencies
    - step: GenerateEnvSetupScript
      module: pypeline.steps.env_setup_script
  gen:
    - step: KConfigGen
      module: yanga_core.steps.kconfig_gen
  build:
    - step: GenerateBuildSystemFiles
      module: yanga.cmake.steps
    - step: GenerateReportConfig
      module: yanga_core.steps.generate_report_config
    - step: ExecuteBuild
      module: yanga.cmake.steps
