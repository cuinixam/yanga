platforms:
  - name: gtest
    description: Build and run components GTest tests
    cmake_generators:
      - step: GTestCMakeGenerator
        module: yanga.cmake.gtest
    toolchain_file: gcc.cmake
    west_dependencies:
      remotes:
        - name: gtest
          url_base: https://github.com/google
      projects:
        - name: googletest
          remote: gtest
          revision: v1.14.0
          path: external/gtest
